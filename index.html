layout: default
# Full-screen landing: shows one of two cosmos images at random on each visit.
# To restore the default post list, replace this file with:
#   ---
#   layout: home
#   # Index page
#   ---
---

<style>
  #landing-hero {
    position: relative;
    width: 100%;
    height: calc(100vh - 5.5rem);
    min-height: 420px;
    border-radius: 12px;
    overflow: hidden;
    background: #04050f;
  }
  #landing-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #landing-hero img.loaded {
    opacity: 1;
  }
</style>

<div id="landing-hero">
  <img id="landing-img"
       src="{{ '/assets/img/landing/home/cosmos-nasa.jpg' | relative_url }}"
       alt="Research Cosmos — exploit dev, malware analysis, ML">
</div>

<script>
  (function () {
    var imgs = [
      {{ '/assets/img/landing/home/cosmos-nasa.jpg'      | relative_url | jsonify }},
      {{ '/assets/img/landing/home/cosmos-gargantua.jpg' | relative_url | jsonify }}
    ];
    var el = document.getElementById('landing-img');
    function show() { el.classList.add('loaded'); }
    el.addEventListener('load', show);
    var pick = imgs[Math.floor(Math.random() * imgs.length)];
    if (pick !== el.getAttribute('src')) { el.src = pick; }
    if (el.complete) show();
  })();
</script>
